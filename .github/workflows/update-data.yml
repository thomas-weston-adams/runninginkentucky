name: Auto-update Run Club Data

on:
  schedule:
    # every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & parse run club data
        env:
          # Set this secret in repo Settings → Secrets → Actions
          # Value: https://docs.google.com/document/d/YOUR_DOC_ID/export?format=txt
          GOOGLE_DOC_URL: ${{ secrets.GOOGLE_DOC_URL }}
        run: node scripts/update-data.mjs

      - name: Fetch races from UltraSignup
        run: node scripts/fetch-races.mjs

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clubs.json data/raw-doc.txt data/races.json
          git diff --cached --quiet || git commit -m "chore: auto-update run club data [skip ci]"
          git push
